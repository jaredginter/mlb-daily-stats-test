name: Daily Starter Stats

on:
  schedule:
    # Every 30 min during MLB hours (11 AM – 1 AM CDT = 16:00–06:00 UTC)
    - cron: '*/30 16-23 * * *'
    - cron: '*/30 0-5 * * *'
    # Hourly overnight (quiet hours — still catches early morning lineup news)
    - cron: '0 6-15 * * *'
  workflow_dispatch:   # allows manual trigger from the GitHub UI

jobs:
  update-stats:
    runs-on: ubuntu-latest
    # Prevent two runs from pushing simultaneously
    concurrency:
      group: mlb-stats-push
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # Persist pybaseball's local cache between daily runs
      - name: Cache pybaseball data
        uses: actions/cache@v4
        with:
          path: ~/.pybaseball/cache
          key: pybaseball-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            pybaseball-${{ runner.os }}-

      - name: Install dependencies
        run: pip install --retries 3 -r requirements.txt

      - name: Fetch daily starter stats
        run: python fetch_daily_stats.py

      - name: Commit updated data
        run: |
          git config --global user.email "mlb-stats-bot@github.com"
          git config --global user.name "MLB Stats Bot"
          # Ensure folder placeholders exist so git always tracks them
          mkdir -p data/hitter_splits data/gamelogs data/tomorrow/hitter_splits data/tomorrow/gamelogs
          touch data/hitter_splits/.gitkeep
          touch data/gamelogs/.gitkeep
          touch data/tomorrow/hitter_splits/.gitkeep
          touch data/tomorrow/gamelogs/.gitkeep
          git add data/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update starter stats $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
