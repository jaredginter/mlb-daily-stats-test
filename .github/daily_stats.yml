name: Daily Starter Stats

on:
  schedule:
    # 9:00 AM ET = 13:00 UTC
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch daily starter stats
        run: python fetch_daily_stats.py

      - name: Commit updated data
        run: |
          git config --global user.email "mlb-stats-bot@github.com"
          git config --global user.name "MLB Stats Bot"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update starter stats $(date -u +%Y-%m-%d)"
          git push
